name: Daily Leaderboard Post
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
jobs:
  post-leaderboard:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # optional, keep it
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install discord.py Pillow requests python-dotenv

      # ---------- ADD THIS NEW STEP ----------
      - name: Install Playwright and browser
        run: |
          pip install playwright
          playwright install --with-deps chromium
      # ---------------------------------------

      - name: Run daily post
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: python daily_post.py
